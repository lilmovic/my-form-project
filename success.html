<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Success</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 30px;
    }

    .header-img {
      width: 180px;
      height: auto;
      margin-bottom: 20px;
    }

    .message {
      font-size: 18px;
      font-weight: bold;
      color: #000;
      margin-bottom: 10px;
    }

    .subtext {
      font-size: 14px;
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 🔥 YOUR HEADER IMAGE -->
    <img src="assets/header.jpg" class="header-img" alt="Logo">

    <!-- MESSAGE -->
    <div class="message">
      Your response has been recorded
    </div>

    <div class="subtext">
      You will be verified in a few.
    </div>

    <a class="btn" href="index.html">Back to Form</a>

  </div>

</body>
</html>
